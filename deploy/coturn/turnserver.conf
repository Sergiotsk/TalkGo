# TalkGo — Coturn TURN/STUN server configuration
# This file is mounted read-only into the coturn container.

# ── Network ──────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Replace with the VPS public IP (e.g. 65.21.100.42).
# Required so Coturn advertises the correct relay address to WebRTC clients.
external-ip=138.201.95.167

# ── Relay port range (must match docker-compose port mapping) ────────────────
min-port=49152
max-port=49200

# ── Security ─────────────────────────────────────────────────────────────────
fingerprint
lt-cred-mech
realm=talkgo

# Coturn does NOT support shell env var expansion in this file.
# Replace CHANGEME_TURN_PASSWORD with a strong secret before deploying,
# and set the matching TURN_PASSWORD env var for the talkgo service.
user=talkgo:CHANGEME_TURN_PASSWORD

no-multicast-peers
no-cli

# ── Logging ──────────────────────────────────────────────────────────────────
log-file=stdout
verbose
